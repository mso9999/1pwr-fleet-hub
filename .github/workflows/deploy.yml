name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          # Ship secrets from GitHub into the SSH session so the remote
          # script can write them to /var/www/fleet-hub/.env without any
          # human in the loop. appleboy/ssh-action inherits step env vars
          # when listed in `envs:`.
          HR_API_BASE_URL: ${{ secrets.HR_API_BASE_URL }}
          HR_API_KEY: ${{ secrets.HR_API_KEY }}
          FLEET_INTEGRATION_API_KEY: ${{ secrets.FLEET_INTEGRATION_API_KEY }}
          DRAFT_CLEANUP_SECRET: ${{ secrets.DRAFT_CLEANUP_SECRET }}
          FLEET_HR_API_KEY: ${{ secrets.FLEET_HR_API_KEY }}
          FLEET_HR_API_ALLOWED_IPS: ${{ secrets.FLEET_HR_API_ALLOWED_IPS }}
          FLEET_PUBLIC_BASE_URL: ${{ secrets.FLEET_PUBLIC_BASE_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: HR_API_BASE_URL,HR_API_KEY,FLEET_INTEGRATION_API_KEY,DRAFT_CLEANUP_SECRET,FLEET_HR_API_KEY,FLEET_HR_API_ALLOWED_IPS,FLEET_PUBLIC_BASE_URL
          script: |
            set -e
            cd /var/www/fleet-hub
            git fetch origin
            git reset --hard origin/main
            npm ci --production=false
            npm run build

            # Refresh server .env with the HR Portal read-only API creds.
            # Dedupe any prior HR_API_* lines before appending so re-runs
            # stay idempotent and rotations land cleanly.
            touch /var/www/fleet-hub/.env
            sed -i.bak '/^HR_API_BASE_URL=/d; /^HR_API_KEY=/d; /^FLEET_INTEGRATION_API_KEY=/d; /^DRAFT_CLEANUP_SECRET=/d; /^FLEET_HR_API_KEY=/d; /^FLEET_HR_API_ALLOWED_IPS=/d; /^FLEET_PUBLIC_BASE_URL=/d' /var/www/fleet-hub/.env
            if [ -n "$HR_API_BASE_URL" ] && [ -n "$HR_API_KEY" ]; then
              printf 'HR_API_BASE_URL=%s\n' "$HR_API_BASE_URL" >> /var/www/fleet-hub/.env
              printf 'HR_API_KEY=%s\n'      "$HR_API_KEY"      >> /var/www/fleet-hub/.env
              echo "HR_API creds written to .env (key length: ${#HR_API_KEY})"
            else
              echo "WARNING: HR_API_BASE_URL or HR_API_KEY missing from GH secrets — skipping .env write"
            fi
            if [ -n "$FLEET_INTEGRATION_API_KEY" ]; then
              printf 'FLEET_INTEGRATION_API_KEY=%s\n' "$FLEET_INTEGRATION_API_KEY" >> /var/www/fleet-hub/.env
              echo "FLEET_INTEGRATION_API_KEY written to .env (length: ${#FLEET_INTEGRATION_API_KEY})"
            else
              echo "NOTE: FLEET_INTEGRATION_API_KEY not set in GH secrets — PR integration endpoints stay 401 until set"
            fi
            if [ -n "$DRAFT_CLEANUP_SECRET" ]; then
              printf 'DRAFT_CLEANUP_SECRET=%s\n' "$DRAFT_CLEANUP_SECRET" >> /var/www/fleet-hub/.env
              echo "DRAFT_CLEANUP_SECRET written to .env (length: ${#DRAFT_CLEANUP_SECRET})"
            else
              echo "NOTE: DRAFT_CLEANUP_SECRET not set in GH secrets — scheduled draft cleanup endpoint auth will fail"
            fi
            if [ -n "$FLEET_HR_API_KEY" ]; then
              printf 'FLEET_HR_API_KEY=%s\n' "$FLEET_HR_API_KEY" >> /var/www/fleet-hub/.env
              echo "FLEET_HR_API_KEY written to .env (length: ${#FLEET_HR_API_KEY})"
            else
              echo "NOTE: FLEET_HR_API_KEY not set in GH secrets — HR-facing /api/deployments/* will 401 until set"
            fi
            if [ -n "$FLEET_HR_API_ALLOWED_IPS" ]; then
              printf 'FLEET_HR_API_ALLOWED_IPS=%s\n' "$FLEET_HR_API_ALLOWED_IPS" >> /var/www/fleet-hub/.env
              echo "FLEET_HR_API_ALLOWED_IPS written to .env"
            else
              echo "NOTE: FLEET_HR_API_ALLOWED_IPS not set — HR API accepts the key from any IP (allow-list disabled)"
            fi
            if [ -n "$FLEET_PUBLIC_BASE_URL" ]; then
              printf 'FLEET_PUBLIC_BASE_URL=%s\n' "$FLEET_PUBLIC_BASE_URL" >> /var/www/fleet-hub/.env
              echo "FLEET_PUBLIC_BASE_URL written to .env ($FLEET_PUBLIC_BASE_URL)"
            else
              echo "NOTE: FLEET_PUBLIC_BASE_URL not set — inspection_url falls back to https://fm.1pwrafrica.com"
            fi

            # Pin DB_PATH in .env so the app always opens the real database
            # (data/fleet-hub.db), not a fresh empty cwd/fleet-hub.db. This is
            # the durable home for the value: `pm2 restart --update-env` below
            # re-reads env from the shell, which has no DB_PATH, so without
            # this line the app would silently fall back to path.join(cwd,
            # 'fleet-hub.db') on every deploy — the 2026-07 vehicles outage was
            # exactly that (a 0-byte cwd DB shadowing the real one).
            sed -i.bak '/^DB_PATH=/d' /var/www/fleet-hub/.env
            printf 'DB_PATH=/var/www/fleet-hub/data/fleet-hub.db\n' >> /var/www/fleet-hub/.env
            echo "DB_PATH written to .env"

            # Remove a stale empty cwd/fleet-hub.db if one was left behind by a
            # prior misconfigured boot. The app reads data/fleet-hub.db (per
            # DB_PATH above); a stray empty file here only risks shadowing it
            # again if DB_PATH is ever dropped. Never deletes a non-empty DB.
            if [ -f /var/www/fleet-hub/fleet-hub.db ] && [ ! -s /var/www/fleet-hub/fleet-hub.db ]; then
              rm -f /var/www/fleet-hub/fleet-hub.db
              echo "Removed stale empty cwd fleet-hub.db"
            fi

            # --update-env re-reads process env; Next.js itself also picks
            # up .env at boot because cwd is /var/www/fleet-hub.
            pm2 restart fleet-hub --update-env
            echo "Fleet Hub deployed successfully"

      - name: Health check
        run: |
          sleep 10
          HOST="${{ secrets.EC2_HOST }}"
          check_url() {
            local url="$1"
            local body
            body="$(curl -sS --connect-timeout 8 --max-time 15 "$url" || true)"
            if [ -z "$body" ]; then
              return 1
            fi
            # Deployment gate: DB must be healthy. Firebase Admin may be intentionally unset
            # in some environments and should not block shipping.
            if echo "$body" | grep -q '"db":{"ok":true'; then
              echo "OK via $url"
              return 0
            fi
            echo "Health response from $url did not report db ok"
            echo "$body"
            return 1
          }

          # Production uses Apache/:80 in front of Node; :3100 may be firewalled.
          if check_url "http://${HOST}/api/health"; then
            exit 0
          elif check_url "http://${HOST}:3100/api/health"; then
            exit 0
          else
            echo "::error::Health check failed for both :80 and :3100 /api/health (db not ok or endpoint unreachable)"
            exit 1
          fi

name: Draft Cleanup

on:
  schedule:
    # Daily at 02:15 UTC
    - cron: "15 2 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    name: Purge stale mission/trip drafts
    runs-on: ubuntu-latest
    steps:
      - name: Call cleanup endpoint
        env:
          HOST: ${{ secrets.EC2_HOST }}
          CLEANUP_KEY: ${{ secrets.DRAFT_CLEANUP_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${HOST:-}" ]; then
            echo "::error::EC2_HOST secret is required"
            exit 1
          fi
          if [ -z "${CLEANUP_KEY:-}" ]; then
            echo "::error::DRAFT_CLEANUP_SECRET secret is required"
            exit 1
          fi

          call_url() {
            local url="$1"
            local status
            local body
            body="$(curl -sS -X POST \
              -H "X-API-Key: ${CLEANUP_KEY}" \
              --connect-timeout 8 --max-time 20 \
              -w '\n%{http_code}' "$url" || true)"
            status="$(echo "$body" | tail -n 1)"
            body="$(echo "$body" | sed '$d')"
            if [ "$status" = "200" ]; then
              echo "Cleanup OK via ${url}"
              echo "$body"
              return 0
            fi
            echo "Cleanup failed via ${url} (status: ${status})"
            echo "$body"
            return 1
          }

          if call_url "http://${HOST}/api/sync/cleanup-drafts"; then
            exit 0
          elif call_url "http://${HOST}:3100/api/sync/cleanup-drafts"; then
            exit 0
          else
            echo "::error::Draft cleanup failed via both :80 and :3100"
            exit 1
          fi
